<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frameshift Sign In</title>
  <link rel="stylesheet" href="../../css/auth.css" />
  <link rel="stylesheet" href="../../css/create-studio.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="welcome-panel" aria-label="Frameshift welcome panel">
      <div class="welcome-overlay"></div>
      <div class="welcome-content">
        <img src="../../images/assets/frameshift-logo.png" alt="Frameshift logo" class="brand-logo" />
        <p class="tagline">Collaborate. Review. Deliver.</p>
        <p class="description">The production management platform built for VFX studios.</p>
      </div>
      <p class="left-footer">© 2025 Frameshift. All rights reserved.</p>
    </section>

    <section class="signin-panel" aria-label="Sign in panel">
      <header class="panel-top">
        <span>New to Frameshift?</span>
        <button type="button" class="create-studio-btn" id="createStudioBtn">Create Studio</button>
      </header>

      <div class="form-wrap">
        <h2>Sign in to your workspace</h2>
        <p>Access your studio, projects and team.</p>

        <form id="loginForm" autocomplete="off">
          <label class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 8l9 6 9-6"></path></svg>
            </span>
            <input type="email" id="emailInput" placeholder="Email address" required />
          </label>

          <label class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="11" width="16" height="9" rx="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg>
            </span>
            <input type="password" id="passwordInput" placeholder="Password" required />
            <button type="button" class="eye-btn" id="togglePassword" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6z"></path><circle cx="12" cy="12" r="2.6"></circle></svg>
            </button>
          </label>

          <div class="options-row">
            <label class="remember-wrap">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="signin-btn">Sign In</button>
        </form>

        <div class="divider"><span>or continue with</span></div>

        <div class="sso-grid">
          <button type="button" class="sso-btn"><span class="sso-mark google" aria-hidden="true"></span>Sign in with Google</button>
          <button type="button" class="sso-btn"><span class="sso-mark microsoft" aria-hidden="true"></span>Sign in with Microsoft</button>
          <button type="button" class="sso-btn"><span class="sso-mark okta" aria-hidden="true"></span>Sign in with Okta</button>
        </div>
      </div>

      <footer class="panel-footer">
        <a href="#">Help</a>
        <span>•</span>
        <a href="#">Privacy</a>
        <span>•</span>
        <a href="#">Terms</a>
      </footer>
    </section>
  </main>
  <div id="createStudioOverlay" hidden></div>

  <script src="../../js/create-studio.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
