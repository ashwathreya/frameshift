<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frameshift — Artist Dashboard</title>
<script>
  const allowDashboard = new URLSearchParams(window.location.search).get("fromLogin") === "1";
  if (!allowDashboard) window.location.replace("./pages/auth/login.html");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./review-workspace.css">
<script src="./app.js" defer></script>
<script src="./reviewEngine.js" defer></script>
</head>
<body>
<div id="root"></div>

<template id="artist-app-template">
<div class="app artist-app">

  <!-- ══════════════ BODY ══════════════ -->
  <div class="body-wrap">

    <!-- ── SIDEBAR (Supervisor shell style + Artist labels) ── -->
    <aside class="sv-sidebar sidebar">
      <div class="sv-brand">
        <img class="sv-brand-logo" src="images/assets/frameshift-logo.png" alt="Frameshift" />
      </div>
      <nav class="sv-nav">
        <button class="sv-nav-item active" data-role="artist" id="nav-dashboard" onclick="event.preventDefault();switchTab('dashboard')">
          <span class="sv-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7"></rect><rect x="13" y="4" width="7" height="4"></rect><rect x="13" y="10" width="7" height="10"></rect><rect x="4" y="13" width="7" height="7"></rect></svg></span>
          <span class="sv-nav-label">Dashboard</span>
        </button>
        <button class="sv-nav-item" data-role="artist" id="nav-tasks" onclick="event.preventDefault();switchTab('overview')">
          <span class="sv-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6h16v4H4z"></path><path d="M4 14h10v4H4z"></path><path d="M17 14h3v4h-3z"></path></svg></span>
          <span class="sv-nav-label">My Tasks</span>
        </button>
        <button class="sv-nav-item" data-role="artist" id="nav-shots" onclick="event.preventDefault();switchTab('versions')">
          <span class="sv-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6h16v10H8l-4 4z"></path></svg></span>
          <span class="sv-nav-label">My Shots</span>
        </button>
      </nav>
      <div class="sv-side-foot">
        <button class="sv-nav-item">
          <span class="sv-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.8-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.8 1l-2.4-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.8 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.8-1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1z"></path></svg></span>
          <span class="sv-nav-label">Settings</span>
        </button>
        <button class="sv-collapse" type="button" onclick="ShellLayout.toggleSidebar(event)">
          <span class="sv-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m14 6-6 6 6 6"></path></svg></span>
          <span class="sv-nav-label">Collapse</span>
        </button>
        <button class="sv-dept-pill">FX Department <span>Change</span></button>
      </div>
    </aside>

    <!-- ══ MAIN ══ -->
    <main class="sv-main main">
      <header class="sv-topbar topbar">
        <div class="sv-project">
          <span>PROJECT</span>
          <select>
            <option>Fire Temple</option>
            <option>Echo Point</option>
            <option>Nova</option>
            <option>Atlas</option>
          </select>
        </div>
        <div class="sv-search-wrap">
          <input class="sv-search" placeholder="Search shots, tasks, versions..." />
        </div>
        <div class="sv-head-actions">
          <button class="sv-insights-btn" onclick="showToast('info','Insights coming soon')">Insights ⚡</button>
          <div class="sv-user-chip user-chip" onclick="UserMenu.toggle(event)">
            <button class="sv-user-avatar user-av">AJ</button>
            <div class="sv-user user-info">
              <span class="sv-user-name user-name">Alex Chen</span><small class="sv-user-role user-role">FX Artist</small>
            </div>
            <svg class="sv-user-chevron" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
            <div class="sv-user-menu" id="user-menu">
              <button onclick="UserMenu.profile(event)">View Profile</button>
              <button onclick="UserMenu.setRole(event,'artist')">Switch to Artist</button>
              <button onclick="UserMenu.setRole(event,'supervisor')">Switch to Supervisor</button>
              <button onclick="UserMenu.setRole(event,'producer')">Switch to Producer</button>
              <button onclick="UserMenu.signOut(event)">Sign Out</button>
            </div>
          </div>
        </div>
      </header>

      <!-- 3-column area -->
      <div class="cols dashboard-content">

        <!-- ─── LEFT: Task List ─── -->
        <div class="col-left">
          <div class="col-left-inner">
            <div class="section-lbl">Assigned to You</div>

            <!-- Current Task -->
            <div class="current-task-card" data-shot="SH_0100" onclick="openTask('SH_0100')">
              <div class="ctc-inner-lbl">Current Task</div>
              <div class="ctc-body">
                <div class="task-thumb">
                  <div class="task-thumb-scene"></div>
                </div>
                <div class="task-info">
                  <div class="task-name"></div>
                  <div class="task-dept"></div>
                  <div class="task-due-row">
                    <span class="task-due-label">Due Today</span>
                    <span class="task-due-time">6:00 PM</span>
                  </div>
                  <span class="badge badge-ip">In Progress</span>
                </div>
              </div>
            </div>

            <!-- Up Next -->
            <div class="section-lbl" style="display:flex;align-items:center;gap:8px;">Up Next<span style="font-size:9px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--t3);background:var(--bg-card);border:1px solid var(--b);border-radius:10px;padding:1px 7px;">assigned by supervisor</span></div>
            <div class="up-next-card" data-shot="SH_0101" onclick="openTask('SH_0101')">
              <div class="ctc-body">
                <div class="task-thumb">
                  <div class="task-thumb-scene" style="background:radial-gradient(ellipse at 50% 80%,rgba(30,60,120,0.8) 0%,transparent 70%);"></div>
                </div>
                <div class="task-info">
                  <div class="task-name"></div>
                  <div class="task-dept"></div>
                  <div class="task-due-row">
                    <span class="task-due-label">Due Tomorrow</span>
                    <span class="task-due-time">10:00 AM</span>
                  </div>
                  <span class="badge badge-assigned">Assigned</span>
                </div>
              </div>
            </div>

            <!-- Other Assigned -->
            <div class="other-hdr">
              <span class="section-lbl" style="margin-bottom:0;">Other Assigned (3)</span>
              <span class="view-all">View All</span>
            </div>

            <div class="task-row" data-shot="SH_0102" onclick="openTask('SH_0102')">
              <div class="task-row-thumb">
                <div style="width:100%;height:100%;background:linear-gradient(135deg,#0D1A2A,#0A1A1A);"></div>
              </div>
              <div class="task-row-body">
                <div class="task-row-name"></div>
                <div class="task-row-meta"></div>
              </div>
              <div class="task-row-right">
                <div class="task-row-due">Due Fri, 24 May</div>
                <div style="font-size:11px;color:var(--t2);">1:00 PM</div>
              </div>
            </div>

            <div class="task-row" data-shot="SH_0103" onclick="openTask('SH_0103')">
              <div class="task-row-thumb">
                <div style="width:100%;height:100%;background:linear-gradient(135deg,#1A0D2A,#2A1010);"></div>
              </div>
              <div class="task-row-body">
                <div class="task-row-name"></div>
                <div class="task-row-meta"></div>
              </div>
              <div class="task-row-right">
                <div class="task-row-due">Due Fri, 24 May</div>
                <div style="font-size:11px;color:var(--t2);">4:00 PM</div>
              </div>
            </div>

            <div class="task-row" data-shot="SH_0104" onclick="openTask('SH_0104')">
              <div class="task-row-thumb">
                <div style="width:100%;height:100%;background:linear-gradient(135deg,#0D2A1A,#101A0A);"></div>
              </div>
              <div class="task-row-body">
                <div class="task-row-name"></div>
                <div class="task-row-meta"></div>
              </div>
              <div class="task-row-right">
                <div class="task-row-due">Due Mon, 27 May</div>
                <div style="font-size:11px;color:var(--t2);">10:00 AM</div>
              </div>
            </div>
          </div>

        </div>

        <!-- ─── CENTER: Work Area ─── -->
        <div class="col-center">

          <!-- Center-left: Task Detail + Viewer -->
          <div class="task-detail">
            <!-- Compact shot bar + tabs -->
            <div class="center-bar">
              <span class="center-shot-id"></span>
              <span class="center-shot-dept">Comp · Main Comp</span>
              <div class="tabs" id="center-tabs">
                <div class="tab active" data-tab="dashboard">Dashboard</div>
                <div class="tab" data-tab="overview">Overview</div>
                <div class="tab" data-tab="notes">Notes <span class="tab-ct" id="tc-notes">2</span></div>
                <div class="tab" data-tab="versions">Versions <span class="tab-ct" id="tc-versions">4</span></div>
                <div class="tab" data-tab="info">Info</div>
              </div>
              <button class="rm-btn" id="rm-btn" onclick="ReviewMode.toggle()">
                <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                <span id="rm-btn-label">Enter Review Mode</span>
              </button>
            </div>

            <!-- ── PANEL: DASHBOARD (default landing) ── -->
            <div class="tab-panel active" data-panel="dashboard" id="panel-dashboard">
              <div class="artist-dashboard">
                <header class="dash-welcome">
                  <h1>Good morning, Alex</h1>
                  <p>Here’s what’s happening with your work today.</p>
                </header>

                <section class="dash-card dash-focus-card">
                  <div class="dash-section-kicker">Today’s Focus</div>
                  <div class="dash-focus-grid">
                    <div class="dash-shot-thumb dash-shot-fire"></div>
                    <div class="dash-focus-main">
                      <span class="dash-status-pill">In Progress</span>
                      <h2></h2>
                      <p></p>
                      <div class="dash-focus-meta">
                        <span></span>
                        <span></span>
                      </div>
                    </div>
                    <div class="dash-focus-deadline">
                      <span>Deadline</span>
                      <strong></strong>
                      <em></em>
                    </div>
                    <div class="dash-focus-progress">
                      <span>Status</span>
                      <strong></strong>
                      <div class="dash-progress-track"><div style="width:60%;"></div></div>
                      <small>60%</small>
                    </div>
                    <div class="dash-focus-actions">
                      <button class="dash-primary-btn" onclick="DashboardActions.continueWorking()">Continue Working</button>
                      <button class="dash-secondary-btn" onclick="DashboardActions.openShot()">Open Shot</button>
                    </div>
                  </div>
                  <div class="dash-note-alert">You have <strong id="dash-new-notes">2</strong> new notes since last login</div>
                </section>

                <div class="dash-command-grid">
                  <div class="dash-left-stack">
                    <section class="dash-card dash-tasks-card">
                    <div class="dash-card-head">
                      <div>
                          <div class="dash-section-kicker">My Tasks</div>
                          <h2>Grouped by urgency</h2>
                      </div>
                        <button class="dash-link-btn" onclick="DashboardActions.openTasks('all')">View all tasks</button>
                    </div>

                      <div class="dash-task-columns">
                        <div class="dash-task-column">
                          <div class="dash-column-title hot">Due Today <span>(2)</span></div>
                          <button class="dash-task-card" data-shot="SH_0102" onclick="openTask('SH_0102')">
                            <span class="dash-mini-thumb dash-shot-smoke"></span>
                            <span><strong>SH_0102</strong><em>Smoke Simulation</em><small>FX</small></span>
                            <mark class="dash-tag due">Due Today</mark>
                          </button>
                          <button class="dash-task-card" data-shot="SH_0103" onclick="openTask('SH_0103')">
                            <span class="dash-mini-thumb dash-shot-ember"></span>
                            <span><strong>SH_0103</strong><em>Ember Detail Pass</em><small>FX</small></span>
                            <mark class="dash-tag due">Due Today</mark>
                          </button>
                          <button class="dash-column-view" onclick="DashboardActions.openTasks('today')">View all 2 tasks</button>
                        </div>

                        <div class="dash-task-column">
                          <div class="dash-column-title warn">Needs Review <span>(3)</span></div>
                          <button class="dash-task-card" data-shot="SH_0098" onclick="openTask('SH_0098')">
                            <span class="dash-mini-thumb dash-shot-fire"></span>
                            <span><strong>SH_0098</strong><em>Fire Pass v003</em><small>FX</small></span>
                            <mark class="dash-tag review">Needs Review</mark>
                          </button>
                          <button class="dash-task-card" data-shot="SH_0099" onclick="openTask('SH_0099')">
                            <span class="dash-mini-thumb dash-shot-dark"></span>
                            <span><strong>SH_0099</strong><em>Lighting Adjustment</em><small>Lighting</small></span>
                            <mark class="dash-tag review">Needs Review</mark>
                          </button>
                          <button class="dash-task-card" data-shot="SH_0101" onclick="openTask('SH_0101')">
                            <span class="dash-mini-thumb dash-shot-glow"></span>
                            <span><strong>SH_0101</strong><em>Glow Variation</em><small>FX</small></span>
                            <mark class="dash-tag review">Needs Review</mark>
                          </button>
                          <button class="dash-column-view" onclick="DashboardActions.openTasks('review')">View all 3 tasks</button>
                        </div>

                        <div class="dash-task-column">
                          <div class="dash-column-title pin">Assigned <span>(5)</span></div>
                          <button class="dash-task-card" data-shot="SH_0110" onclick="openTask('SH_0110')">
                            <span class="dash-mini-thumb dash-shot-dark"></span>
                            <span><strong>SH_0110</strong><em>Blocking Pass</em><small>Layout</small></span>
                            <time>May 27</time>
                          </button>
                          <button class="dash-task-card" data-shot="SH_0112" onclick="openTask('SH_0112')">
                            <span class="dash-mini-thumb dash-shot-smoke"></span>
                            <span><strong>SH_0112</strong><em>FX Setup</em><small>FX</small></span>
                            <time>May 28</time>
                          </button>
                          <button class="dash-task-card" data-shot="SH_0115" onclick="openTask('SH_0115')">
                            <span class="dash-mini-thumb dash-shot-ember"></span>
                            <span><strong>SH_0115</strong><em>Smoke Interaction</em><small>FX</small></span>
                            <time>May 30</time>
                          </button>
                          <button class="dash-column-view" onclick="DashboardActions.openTasks('assigned')">View all 5 tasks</button>
                        </div>
                      </div>
                    </section>

                    <section class="dash-card dash-progress-card">
                      <div class="dash-section-kicker">My Progress</div>
                      <div class="dash-stat-grid">
                        <div><span class="dash-stat-icon ok"></span><strong>3</strong><small>Completed Today</small></div>
                        <div><span class="dash-stat-icon pending"></span><strong>6</strong><small>Pending Tasks</small></div>
                        <div><span class="dash-stat-icon review"></span><strong>2</strong><small>In Review</small></div>
                        <div><span class="dash-stat-icon overdue"></span><strong>1</strong><small>Overdue</small></div>
                      </div>
                      <div class="dash-weekly">
                        <span>Weekly Progress</span>
                        <div class="dash-progress-track"><div style="width:62%;"></div></div>
                        <strong>62%</strong>
                        <small>19 / 30 tasks completed</small>
                      </div>
                    </section>
                  </div>

                  <div class="dash-right-stack">
                    <section class="dash-card dash-feedback-card">
                      <div class="dash-card-head">
                        <div>
                          <div class="dash-section-kicker">Recent Feedback</div>
                          <h2>Latest supervisor notes</h2>
                    </div>
                        <button class="dash-link-btn" onclick="DashboardActions.openTasks('notes')">View all</button>
                      </div>
                      <div class="dash-feedback-list">
                        <button class="is-new" onclick="DashboardActions.openFeedback(84)">
                          <span class="dash-avatar">SC</span>
                          <span><strong>SH_0100 · Fire Temple – Wide</strong><em>Increase fire density in the mid ground around frame 120.</em></span>
                          <time>1h ago</time><mark>New</mark>
                        </button>
                        <button class="is-new" onclick="DashboardActions.openFeedback(105)">
                          <span class="dash-avatar">SC</span>
                          <span><strong>SH_0101 · Fire Close Up</strong><em>The glow feels a bit too strong. Let’s tone it down.</em></span>
                          <time>3h ago</time><mark>New</mark>
                        </button>
                        <button onclick="DashboardActions.openFeedback(90)">
                          <span class="dash-avatar">SC</span>
                          <span><strong>SH_0098 · Fire Pass</strong><em>Timing feels off in the second half. Please slow down the rise.</em></span>
                          <time>1d ago</time><mark class="seen">Seen</mark>
                        </button>
                        <button onclick="DashboardActions.openFeedback(148)">
                          <span class="dash-avatar ok">SC</span>
                          <span><strong>SH_0095 · Wide Establish</strong><em>Looks good! Approved this version.</em></span>
                          <time>2d ago</time><mark class="addressed">Addressed</mark>
                        </button>
                      </div>
                      <button class="dash-column-view" onclick="DashboardActions.openTasks('notes')">Go to Notes</button>
                    </section>

                    <section class="dash-card dash-actions-card">
                      <div class="dash-section-kicker">Quick Actions</div>
                      <div class="dash-action-grid">
                        <button onclick="DashboardActions.uploadVersion()"><span>Upload New Version</span><small>Add a new version</small></button>
                        <button onclick="DashboardActions.continueWorking()"><span>Open Last Shot</span><small>Continue where you left off</small></button>
                        <button onclick="DashboardActions.startReview()"><span>Start Review Mode</span><small>Review with annotation</small></button>
                        <button onclick="DashboardActions.createNote()"><span>Create Note</span><small>Add a new note</small></button>
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            </div><!-- /panel-dashboard -->


            <!-- ── PANEL: OVERVIEW ── -->
            <div class="tab-panel" data-panel="overview" id="panel-overview">
              <!-- Viewer -->
              <div class="viewer">
                <div class="active-task-banner" id="active-task-banner">Working on SH_0100 · FX Simulation</div>
                <div class="player-mode" id="player-mode">Review Mode</div>
                <div class="viewer-scene">
                  <div class="viewer-bg"></div>
                  <div class="viewer-stars"></div>
                  <div class="viewer-structure"></div>
                  <div class="viewer-glow"></div>
                  <div class="viewer-figure"></div>
                  <div class="viewer-fog"></div>
                  <div class="viewer-top-fog"></div>
                </div>
                <!-- Annotation canvas overlay -->
                <canvas id="ann-canvas" class="ann-hidden"></canvas>

                <div class="context-note-pop context-note-hidden" id="context-note-pop" aria-live="polite"></div>

                <!-- Frame marker timeline — integrated inside viewer -->
                <div class="frame-timeline" id="frame-timeline">
                  <div class="ftl-rail"></div>
                  <div class="ftl-playhead" id="ftl-playhead"></div>
                  <div class="ftl-total" id="ftl-total">320fr</div>
                </div>

                <div class="viewer-controls">
                  <button class="player-btn" title="Skip to start">
                    <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                  </button>
                  <button class="player-btn" title="Step back">
                    <svg viewBox="0 0 24 24"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg>
                  </button>
                  <button class="player-btn" title="Previous frame">
                    <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/></svg>
                  </button>
                  <button class="player-btn player-btn-play" title="Play" id="main-play-btn" onclick="togglePlay(this)">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  </button>
                  <button class="player-btn" title="Next frame">
                    <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/></svg>
                  </button>
                  <button class="player-btn" title="Skip to end">
                    <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                  </button>
                  <button class="player-btn" title="Loop">
                    <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                  </button>
                  <div class="player-progress" id="main-progress" onclick="scrubProgress(event)">
                    <div class="player-progress-fill" id="main-progress-fill" style="width:35%;"></div>
                  </div>
                  <span style="font-size:10px;color:rgba(255,255,255,0.4);white-space:nowrap;font-family:monospace;" id="main-timecode">00:08:24</span>
                  <div style="width:1px;height:13px;background:rgba(255,255,255,0.1);flex-shrink:0;margin:0 2px;"></div>
                  <button class="player-btn player-btn-ann" id="ann-toggle" title="Toggle annotations" onclick="AnnotationSystem.toggleOverlay()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>Annotate</span>
                  </button>
                </div>
              </div><!-- /viewer -->
            </div><!-- /panel-overview -->

            <!-- ── PANEL: NOTES ── -->
            <div class="tab-panel" data-panel="notes" id="panel-notes">
              <!-- Thread -->
              <div class="cn-thread" id="cn-thread">
                <!-- Supervisor message 1 -->
                <div class="cn-msg cn-sup">
                  <div class="cn-av cn-av-sup">SC</div>
                  <div class="cn-body">
                    <div class="cn-hdr"><span class="cn-author">Sarah Chen</span><span class="cn-role-badge cn-role-sup">Supervisor</span><span class="cn-time">2h ago</span></div>
                    <div class="cn-txt">Please clean up the edge light spill on frame 101–105. The spill reads as a green tint — run a luma matte and apply curves.</div>
                    <div class="cn-frame-tag" onclick="seekToFrame(101)">
